name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Check formatting
        run: melos run format

      - name: Analyze
        run: melos run analyze

      - name: Run tests
        run: melos run test

      - name: Pub publish dry-run
        run: melos run dry-run
