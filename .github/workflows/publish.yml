name: Publish

on:
  push:
    tags:
      - 'display_brightness-v*'
      - 'display_brightness_platform_interface-v*'
      - 'display_brightness_android-v*'
      - 'display_brightness_ios-v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish (true) or Dry-run (false)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# Required for pub.dev trusted publishing (OIDC)
permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Analyze
        run: melos run analyze

      - name: Run tests
        run: melos run test

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.publish == 'false'
        run: melos publish --dry-run

      - name: Publish
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
        run: melos publish --no-dry-run -y

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == 'true'))
        with:
          generate_release_notes: true
