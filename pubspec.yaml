name: display_brightness_workspace
publish_to: none

environment:
  sdk: ^3.10.0

workspace:
  - packages/display_brightness
  - packages/display_brightness_platform_interface
  - packages/display_brightness_android
  - packages/display_brightness_ios
  - packages/display_brightness/example

dev_dependencies:
  melos: ^7.0.0

melos:
  repository: https://github.com/Mankeli-Software/display_brightness
  command:
    version:
      conventionalCommits: true
      updateDependentsConstraints: true
      linkToCommits: true

  scripts:
    analyze:
      description: Run `dart analyze` in all packages.
      exec: dart analyze --fatal-infos

    test:
      description: Run `flutter test` in all packages that have tests.
      exec: flutter test
      packageFilters:
        dirExists: test

    test:coverage:
      description: Run `flutter test --coverage` in all packages that have tests.
      exec: flutter test --coverage
      packageFilters:
        dirExists: test

    format:
      description: Check formatting in all packages.
      exec: dart format --set-exit-if-changed .

    format:fix:
      description: Fix formatting in all packages.
      exec: dart format .

    codegen:android:
      description: Regenerate Android JNI bindings.
      exec: dart run tool/jnigen.dart
      packageFilters:
        scope: display_brightness_android

    codegen:ios:
      description: Regenerate iOS swiftgen bindings.
      exec: dart run tool/swiftgen.dart
      packageFilters:
        scope: display_brightness_ios

    dry-run:
      description: Dry-run publish all packages.
      exec: dart pub publish --dry-run
      packageFilters:
        noPrivate: true

