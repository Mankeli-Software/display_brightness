name: display_brightness
description: "Control app-level screen brightness on iOS and Android using direct native interop (jnigen/swiftgen). No permissions required."
version: 0.1.0
homepage: https://github.com/Mankeli-Software/display_brightness
topics:
  - screen
  - brightness
  - jnigen
  - swiftgen
  - ffi

environment:
  sdk: ^3.10.0
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3
  jni: ^1.0.0
  objective_c: ^9.3.0
  jni_flutter: ^1.0.1
  meta: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  jnigen: ^0.16.0
  swiftgen: ^0.1.2
  logging: ^1.3.0
  ffigen: ^20.1.1

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
